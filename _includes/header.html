<header class="site-header">

    <!-- Search bar (desktop) -->
    <div class="header-search" id="header-search">

      <li><a href="{{ '/recettes/' | relative_url }}" {% if page.url contains '/recettes/' %}class="active"{% endif %}>Recettes</a></li>

      <li class="mobile-search-link"><a href="{{ '/recherche/' | relative_url }}">🔍 Rechercher</a></li>
